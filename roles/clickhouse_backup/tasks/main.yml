---
- name: Resolve ClickHouse backup deployment mode
  ansible.builtin.set_fact:
    clickhouse_backup_use_docker: "{{ CLICKHOUSE_BACKUP_USE_DOCKER | default(CLICKHOUSE_INSTALL_DOCKER | default(false)) | bool }}"

- name: Resolve ClickHouse backup paths for Docker deployments
  ansible.builtin.set_fact:
    clickhouse_backup_host_path: "{{ CLICKHOUSE_DATA_DIR }}/backups"
    clickhouse_backup_server_path: /var/lib/clickhouse/backups
    clickhouse_backup_config_path: "{{ CLICKHOUSE_BASE_DIR }}/config.d"
    clickhouse_backup_container_name: "{{ CLICKHOUSE_BACKUP_CONTAINER_NAME | default(CLICKHOUSE_CONTAINER_NAME | default('clickhouse')) }}"
    clickhouse_backup_compose_file: "{{ CLICKHOUSE_BASE_DIR }}/docker-compose.yml"
  when: clickhouse_backup_use_docker | bool

- name: Resolve ClickHouse backup paths for native deployments
  ansible.builtin.set_fact:
    clickhouse_backup_host_path: "{{ CLICKHOUSE_BACKUP_ROOT }}"
    clickhouse_backup_server_path: "{{ CLICKHOUSE_BACKUP_ROOT }}"
    clickhouse_backup_config_path: /etc/clickhouse-server/config.d
    clickhouse_backup_container_name: "{{ CLICKHOUSE_BACKUP_CONTAINER_NAME | default('clickhouse') }}"
    clickhouse_backup_compose_file: ""
  when: not clickhouse_backup_use_docker | bool

- name: Set ClickHouse backup artifact paths
  ansible.builtin.set_fact:
    clickhouse_artifact_path: "{{ clickhouse_backup_host_path }}"
    clickhouse_backup_location: "{{ clickhouse_backup_host_path }}/{{ CLICKHOUSE_BACKUP_DATE }}.d"

- name: Set ClickHouse client command
  ansible.builtin.set_fact:
    clickhouse_backup_client_base: >-
      {{
        CLICKHOUSE_BACKUP_CLIENT_COMMAND
        if CLICKHOUSE_BACKUP_CLIENT_COMMAND | length > 0
        else (
          'docker exec ' ~ clickhouse_backup_container_name ~ ' clickhouse-client'
          if clickhouse_backup_use_docker | bool
          else 'clickhouse-client'
        )
      }}

- name: Clean the backup root path before starting the routine
  ansible.builtin.file:
    state: absent
    path: "{{ clickhouse_artifact_path }}/"
  when: |
    CLICKHOUSE_BACKUP_PRE_CLEAN_ROOT
    and clickhouse_artifact_path is defined
    and clickhouse_artifact_path != ""
    and CLICKHOUSE_BACKUP_STORAGE_OPTIONS.EXTERNAL_STORAGE_TYPE != ""

# Since ubuntu 24/Debian 12 have problems with the backup playbook because of PEP 668 when updating the libraries, we proceed
# to create a task to ignore EXTERNALLY-MANAGED
- name: Get python system info
  community.general.python_requirements_info:
  register: python_info

- name: Ignore PEP 668 (Ubuntu/Debian)
  ansible.builtin.file:
    path: "/usr/lib/python{{ python_info.python_version_info.major }}.{{ python_info.python_version_info.minor }}/EXTERNALLY-MANAGED"
    state: absent
  when:
    - (ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('24', '>=')) or
      (ansible_distribution == 'Debian' and ansible_distribution_major_version | int >= 12)

- name: Configure ClickHouse backup disk
  ansible.builtin.include_tasks: configure_disk.yml
  when: CLICKHOUSE_BACKUP_CONFIGURE_DISK | bool

- name: Launch ClickHouse backups
  ansible.builtin.include_tasks: backup.yml

- name: Clean artifact path
  ansible.builtin.file:
    state: absent
    path: "{{ clickhouse_artifact_path }}/"
  when: clickhouse_artifact_path is defined and clickhouse_artifact_path != "" and CLICKHOUSE_BACKUP_STORAGE_OPTIONS.EXTERNAL_STORAGE_TYPE != ""
